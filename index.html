<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Lirikfy — Cari Lirik Lagu</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <div class="logo-text">
                <h1>Lirikfy</h1>
                <p>DEV UDIN AI</p>
            </div>
        </div>
        <div class="search-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari lagu, artis..." autocomplete="off">
                <button class="search-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
            </div>
        </div>
        <div class="chips">
            <div class="chip" data-query="Populer">🔥 Populer</div>
            <div class="chip" data-query="Indonesia">🇮🇩 Indonesia</div>
            <div class="chip" data-query="Rock Alternatif">🎸 Rock</div>
            <div class="chip" data-query="Dangdut">🎤 Dangdut</div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <!-- STATE: IDLE -->
        <div id="idleState" class="state-container idle-state">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <p>🎵 Cari lirik lagu favoritmu</p>
            <small>Ketuk tombol cari atau pilih kategori</small>
        </div>

        <!-- STATE: LOADING -->
        <div id="loadingState" class="state-container loading-state hidden">
            <div class="spinner"></div>
        </div>

        <!-- STATE: RESULTS -->
        <div id="resultsState" class="state-container hidden"></div>

        <!-- STATE: LYRICS -->
        <div id="lyricsState" class="state-container hidden"></div>

        <!-- STATE: ERROR -->
        <div id="errorState" class="state-container error-state hidden">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <circle cx="12" cy="16" r="0.5" fill="#f87171"/>
            </svg>
            <p style="margin-top: 16px; font-weight: 600;">Lirik tidak ditemukan</p>
            <p style="font-size: 14px;">Coba kata kunci lain (Judul - Artis)</p>
            <button id="errorRetryBtn" style="margin-top: 24px; background: #1DB954; border: none; padding: 10px 24px; border-radius: 500px; font-weight: 700; color: #000;">Coba Lagi</button>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script src="config.js"></script>
<script src="main.js"></script>
</body>
</html>
